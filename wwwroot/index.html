<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<style>
table, tr, td {border:1px solid black;}
div {padding:10px; overflow:hidden;}
</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light">
<div class="container-fluid">
<a class="navbar-brand" href="#">MeuSistema</a>

<div class="collapse navbar-collapse">
<ul class="navbar-nav">

<li class="nav-item">
<a href="#" class="nav-link">Vendas</a>
</li>

<li class="nav-item">
<a href="#" class="nav-link">Estoque</a>
</li>

<li class="nav-item">
<a href="#" class="nav-link">Contatos</a>
</li>

</ul>
</div>
</div>
</nav>

<div class="card">

<div class="card-header">
<h3 class="card-title text-center">Clientes Cadastrados</h3>
</div>

<div class="card-body">

<a data-bs-toggle="modal" data-bs-target="#myModal" class="btn btn-primary">
<span class="bi bi-plus"></span> Novo
</a>

<div class="table-responsive">

<table id="listaCadastro" class="table table-striped table-hover">

<thead>
<tr>
<th>Documento</th>
<th>Nome</th>
<th>Sexo</th>
<th>Email</th>
<th>Telefone</th>
<th>Estado</th>
<th>Ações</th>
</tr>
</thead>

<tbody>
</tbody>

</table>

</div>
</div>
</div>

<!-- MODAL -->

<div class="container">

<div class="modal fade" id="myModal">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5 class="modal-title">Cadastro Cliente</h5>
<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<form>

<fieldset class="mb-4">
<legend>Dados pessoais</legend>

<div class="row mb-3">
<label class="col-sm-3 col-form-label">Documento</label>
<div class="col-sm-9">
<input type="text" class="form-control" id="documento">
</div>
</div>

<div class="row mb-3">
<label class="col-sm-3 col-form-label">Nome</label>
<div class="col-sm-9">
<input type="text" class="form-control" id="nome">
</div>
</div>

<div class="row mb-3">
<label class="col-sm-3 col-form-label">Sexo</label>
<div class="col-sm-9">

<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="sexo" value="Feminino">
<label class="form-check-label">Feminino</label>
</div>

<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="sexo" value="Masculino">
<label class="form-check-label">Masculino</label>
</div>

</div>
</div>

</fieldset>

<fieldset class="mb-4">
<legend>Contato</legend>

<div class="row mb-3">
<label class="col-sm-3 col-form-label">Email</label>
<div class="col-sm-9">
<input type="email" class="form-control" id="email">
</div>
</div>

<div class="row mb-3">
<label class="col-sm-3 col-form-label">Telefone</label>
<div class="col-sm-9">
<input type="tel" class="form-control" id="telefone">
</div>
</div>

<div class="row mb-3">
<label class="col-sm-3 col-form-label">UF</label>
<div class="col-sm-9">

<select class="form-select" id="uf">
<option value="">Estado</option>
<option value="SC">SC</option>
<option value="RS">RS</option>
<option value="SP">SP</option>
<option value="RJ">RJ</option>
</select>

</div>
</div>

</fieldset>

<div class="text-end">
<button type="button" class="btn btn-primary" onclick="salvaCadastro()">
<span class="bi bi-save"></span> Gravar
</button>
</div>

</form>

</div>
</div>
</div>
</div>

</div>

<script>

var linhaEditando = null;

function salvaCadastro(){

    $.ajax({
        url: "http://localhost:5252/api/cliente/salvar",
        type: "POST",
        contentType: "application/json",
        data: JSON.stringify({
            documento: documento,
            nome: nome,
            sexo: sexo,
            email: email,
            telefone: telefone,
            uf: uf
        }),
        success: function (response) {

            AdicionarLinhaTabela(documento, nome, sexo, email, telefone, uf);

            limparFormulario();

            linhaEditando = null;

            var modal = bootstrap.Modal.getInstance(document.getElementById('myModal'));
            modal.hide();

        },
        error: function (error) {
            console.log("Erro:", error);
        }
    });

}

function AdicionarLinhaTabela(documento,nome,sexo,email,telefone,uf){

    var NovaLinha =

    '<tr id="linha'+documento+'">'+
    '<td>'+documento+'</td>'+
    '<td>'+nome+'</td>'+
    '<td>'+sexo+'</td>'+
    '<td>'+email+'</td>'+
    '<td>'+telefone+'</td>'+
    '<td>'+uf+'</td>'+
    '<td>'+
    '<button class="btn btn-primary btn-sm" onclick="editarUsuario(\''+documento+'\')">Editar</button> '+
    '<button class="btn btn-danger btn-sm" onclick="removeUsuario(\''+documento+'\')">Excluir</button>'+
    '</td>'+
    '</tr>';

    $('#listaCadastro tbody').prepend(NovaLinha);

    }


function removeUsuario(documento){

    $.ajax({
        url: "http://localhost:5252/api/cliente/delete?id=" + documento,
        type: "DELETE"
    });

    }

    function editarUsuario(documento) {


        var linha = $("#linha"+documento);

        var nome = linha.find("td:eq(1)").text();
        var sexo = linha.find("td:eq(2)").text();
        var email = linha.find("td:eq(3)").text();
        var telefone = linha.find("td:eq(4)").text();
        var uf = linha.find("td:eq(5)").text();

        $("#documento").val(documento);
        $("#nome").val(nome);
        $("#email").val(email);
        $("#telefone").val(telefone);
        $("#uf").val(uf);

        $("input[name='sexo'][value='"+sexo+"']").prop("checked",true);

        linhaEditando = documento;

        var modal = new bootstrap.Modal(document.getElementById('myModal'));
        modal.show();

}

function limparFormulario(){

        $("#documento").val("");
        $("#nome").val("");
        $("#email").val("");
        $("#telefone").val("");
        $("#uf").val("");
        $("input[name='sexo']").prop("checked",false);



    }


    function carregarClientes() {

        $.ajax({
            url: "http://localhost:5252/api/cliente/listar",
            type: "GET",
            success: function (data) {

                $('#listaCadastro tbody').empty();

                data.forEach(function (cliente) {
                    AdicionarLinhaTabela(
                        cliente.documento,
                        cliente.nome,
                        cliente.sexo,
                        cliente.email,
                        cliente.telefone,
                        cliente.uf
                    );
                });
            }
        });
    }

    $(document).ready(function () {
        carregarClientes();
    });

</script>

</body>
</html>
