<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        table, tr, td {
            border: 1px solid black;
        }

        div {
            padding: 10px;
            overflow: hidden;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">

            <a class="navbar-brand" href="#">MeuSistema</a>

            <div class="collapse navbar-collapse">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a href="#" class="nav-link">Vendas</a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link">Estoque</a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link">Contatos</a>
                    </li>
                </ul>
            </div>

        </div>
    </nav>

    <!-- CARD -->
    <div class="card">

        <div class="card-header">
            <h3 class="card-title text-center">Clientes Cadastrados</h3>
        </div>

        <div class="card-body">

            <!-- BOTÃO NOVO -->
            <button class="btn btn-primary"
                    data-bs-toggle="modal"
                    data-bs-target="#myModal"
                    onclick="limparFormulario()">

                <span class="bi bi-plus"></span> Novo
            </button>

            <!-- TABELA -->
            <div class="table-responsive mt-3">

                <table id="listaCadastro" class="table table-striped table-hover">

                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Documento</th>
                            <th>Nome</th>
                            <th>Sexo</th>
                            <th>Email</th>
                            <th>Telefone</th>
                            <th>Estado</th>
                            <th>Ações</th>
                        </tr>
                    </thead>

                    <tbody></tbody>

                </table>

            </div>

        </div>
    </div>

    <!-- MODAL -->
    <div class="modal fade" id="myModal">

        <div class="modal-dialog">

            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Cadastro Cliente</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <!-- ID oculto -->
                    <input type="hidden" id="id">

                    <form>

                        <div class="mb-2">
                            <input type="text" class="form-control" id="documento" placeholder="Documento">
                        </div>

                        <div class="mb-2">
                            <input type="text" class="form-control" id="nome" placeholder="Nome">
                        </div>

                        <div class="mb-2">
                            <input type="email" class="form-control" id="email" placeholder="Email">
                        </div>

                        <div class="mb-2">
                            <input type="text" class="form-control" id="telefone" placeholder="Telefone">
                        </div>

                        <div class="mb-2">
                            <select class="form-select" id="uf">
                                <option value="">Estado</option>
                                <option value="SP">SP</option>
                                <option value="RJ">RJ</option>
                                <option value="SC">SC</option>
                                <option value="RS">RS</option>
                            </select>
                        </div>

                        <div class="mb-2">
                            <label>
                                <input type="radio" name="sexo" value="M"> Masculino
                            </label>

                            <label>
                                <input type="radio" name="sexo" value="F"> Feminino
                            </label>
                        </div>

                        <div class="text-end">
                            <button type="button"
                                    class="btn btn-primary"
                                    onclick="salvarCliente()">
                                Salvar
                            </button>
                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

<script>
    //verificação commit
    window.onload = carregarClientes;

    let linhaEditando = null;

    // 🔹 SALVAR / EDITAR
    async function salvarCliente() {

    const id = document.getElementById("id")?.value || null;

    const sexoSelecionado = document.querySelector("input[name='sexo']:checked");

    const cliente = {
        idCliente: id ? parseInt(id) : 0,
        documento: document.getElementById("documento").value,
        nome: document.getElementById("nome").value,
        sexo: sexoSelecionado ? sexoSelecionado.value : "",
        email: document.getElementById("email").value,
        telefone: document.getElementById("telefone").value,
        uf: document.getElementById("uf").value
    };

    let url = "https://cadastrocliente-api.onrender.com/Cliente";
    let metodo = "POST";

    if (id) {
        url = `https://cadastrocliente-api.onrender.com/Cliente/${id}`;
        metodo = "PUT";
    }

    try {
        const response = await fetch(url, {
        method: metodo,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(cliente)
        });

        if (!response.ok) throw new Error("Erro ao salvar");

        alert("Salvo com sucesso!");

        bootstrap.Modal.getInstance(document.getElementById('myModal')).hide();

        limparFormulario();
        carregarClientes();

    } catch (err) {
        console.error(err);
        alert("Erro ao salvar cliente");
    }
    }

    // 🔹 LISTAR
    async function carregarClientes() {
    try {
        const response = await fetch("https://cadastrocliente-api.onrender.com/Cliente");

        if (!response.ok) throw new Error("Erro ao buscar clientes");

        const clientes = await response.json();

        const tabela = document.querySelector("#listaCadastro tbody");
        tabela.innerHTML = "";

        clientes.forEach(c => {
        tabela.innerHTML += `
            <tr>
            <td>${c.idCliente}</td>
            <td>${c.documento}</td>
            <td>${c.nome}</td>
            <td>${c.sexo}</td>
            <td>${c.email}</td>
            <td>${c.telefone}</td>
            <td>${c.uf}</td>
            <td>
                <button class="btn btn-warning btn-sm" onclick="editarCliente(${c.idCliente})">Editar</button>
                <button class="btn btn-danger btn-sm" onclick="deletarCliente(${c.idCliente})">Excluir</button>
            </td>
            </tr>
        `;
        });

    } catch (err) {
        console.error(err);
        alert("Erro ao carregar clientes");
    }
    }

    // 🔹 DELETE
    async function deletarCliente(id) {
    if (!confirm("Deseja excluir?")) return;

    try {
        await fetch(`https://cadastrocliente-api.onrender.com/Cliente/${id}`, {
        method: "DELETE"
        });

        carregarClientes();

    } catch (err) {
        console.error(err);
        alert("Erro ao excluir");
    }
    }

    // 🔹 EDITAR
    async function editarCliente(id) {
    try {
        const response = await fetch(`https://cadastrocliente-api.onrender.com/Cliente/${id}`);
        const cliente = await response.json();

        document.getElementById("documento").value = cliente.documento;
        document.getElementById("nome").value = cliente.nome;
        document.getElementById("email").value = cliente.email;
        document.getElementById("telefone").value = cliente.telefone;
        document.getElementById("uf").value = cliente.uf;

        document.querySelector(`input[name='sexo'][value='${cliente.sexo}']`).checked = true;

        linhaEditando = id;

        const modal = new bootstrap.Modal(document.getElementById('myModal'));
        modal.show();

    } catch (err) {
        console.error(err);
        alert("Erro ao editar cliente");
    }
    }

    // 🔹 LIMPAR
    function limparFormulario() {
    document.getElementById("documento").value = "";
    document.getElementById("nome").value = "";
    document.getElementById("email").value = "";
    document.getElementById("telefone").value = "";
    document.getElementById("uf").value = "";
    document.querySelectorAll("input[name='sexo']").forEach(r => r.checked = false);
    }
</script>    

</body>
</html>
